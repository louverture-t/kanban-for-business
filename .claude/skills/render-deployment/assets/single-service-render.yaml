# =========================================================================
# DEPLOYMENT NOTES
# =========================================================================
#
# Deploy Process:
# 1. Commit and push code to the specified GitHub branch (main)
# 2. Render detects the push (if autoDeploy: true)
# 3. Deployment steps:
#    a. Check out code from the branch
#    b. Run buildCommand in rootDir (./server)
#       - Installs server dependencies
#       - Compiles server TypeScript to dist/
#       - Builds client and outputs to ../client/dist
#    c. Run startCommand: node dist/index.js
#    d. Express starts, serves API at /graphql and static files at /
#    e. Allocate a Render URL (e.g., https://app.onrender.com)
#
# Accessing Service After Deployment:
# - React Frontend: https://app.onrender.com
# - GraphQL API: https://app.onrender.com/graphql
# - GraphQL Playground: https://app.onrender.com/graphql (if enabled)
#
# Common Issues:
#
# Issue: "Cannot find module '../client/dist'"
# Solution: Verify build script compiles client before starting server
#           Check that client build completes successfully in logs
#
# Issue: "Static site returns 404 for routes"
# Solution: Ensure SPA fallback in Express serves index.html for non-API routes
#           Verify clientBuildPath points to correct ../client/dist directory
#
# Issue: "Build failed during client build"
# Solution: Check buildCommand includes `npm ci && npm run build` in client
#           Verify package.json in client directory exists
#           Run `npm run build:client` locally to debug
#
# Issue: "CORS errors from frontend to API"
# Solution: Update ALLOWED_ORIGINS to include service URL
#           Since frontend and backend are same domain, CORS may not be needed
#           Verify Apollo Client uri is set correctly (usually '/graphql')
#
# Issue: "Port conflict or dynamic port not read"
# Solution: Ensure Express reads process.env.PORT
#           Verify app.listen(process.env.PORT || 4000, ...)
#           Check logs for actual port being listened on
#
# Scaling & Performance:
# - Free tier: 0.5 CPU, 512 MB RAM (good for development)
# - Starter tier: 1 CPU, 512 MB RAM (suitable for small production workloads)
# - Pro/Professional tier: Variable resources (for high-traffic production)
#
# To upgrade, use Render Dashboard → Services → Settings → Plan
#
# Performance Considerations for Single Service:
# - Combined process: Backend and frontend share CPU/memory
# - Static file serving: Express serves files; consider adding caching headers
# - Build time: Both client and server are compiled on each deploy
#   → Longer build times compared to two-service pattern
# - Independent scaling: Not possible; must scale entire service together
#   → If frontend needs more resources, backend scales too
#
# To minimize build time:
# - Use npm ci (faster than npm install)
# - Cache dependencies in client/node_modules via npm ci
# - Consider separating build scripts if server and client build times vary greatly
#
# Monitoring:
# - Render Dashboard → Services → Logs: View deployment and runtime logs
# - Render Dashboard → Services → Deploys: See deployment history and status
# - Use Apollo Server's built-in metrics for GraphQL performance insights
