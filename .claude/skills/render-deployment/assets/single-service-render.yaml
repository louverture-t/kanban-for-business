# Render Deployment Configuration — MERN + GraphQL + TypeScript (Single Service)
#
# This render.yaml configures a MERN stack as a single web service where:
# - Backend: Express + Apollo Server v4 + Mongoose v8 + GraphQL (./server)
# - Frontend: React 18 + Vite + Apollo Client + TypeScript (./client)
# - Static files: Built React assets served from Express middleware
# - Database: MongoDB Atlas (external, referenced via MONGODB_URI env var)
#
# The Express server:
# 1. Builds and compiles TypeScript backend code
# 2. Builds and compiles React frontend code
# 3. Serves GraphQL API at /graphql
# 4. Serves React static files at all other routes via express.static()
#
# WHEN TO USE THIS PATTERN:
# - Development and testing
# - Small-scale production deployments
# - Simplified infrastructure (single deployment pipeline)
# - Reduced operational complexity and cost
#
# WHEN TO USE TWO-SERVICE PATTERN (monorepo-render.yaml):
# - High-traffic applications needing independent scaling
# - Separate frontend caching strategies and CDN usage
# - Decoupled deployment cycles for frontend and backend
# - Complex infrastructure or advanced monitoring needs
#
# IMPORTANT: For this pattern to work, your Express server must:
# 1. Build the client: npm run build (run from server build command)
# 2. Serve client static files: app.use(express.static('../client/dist'))
# 3. Implement SPA fallback: Serve index.html for non-API routes

services:
  # =========================================================================
  # SINGLE WEB SERVICE: Express API + React SPA
  # =========================================================================
  # Hosts both the GraphQL API (Express + Apollo Server) and the React frontend.
  # Runs on a single port; Express routes API requests to /graphql
  # and serves React files for all other routes.

  - type: web
    name: app

    # GitHub repository and branch to deploy from
    repo: https://github.com/user/repo
    branch: main

    # Path to root directory (or ./server for this pattern)
    # Render executes build and start commands relative to this path
    # Assuming Express server is in ./server directory
    rootDir: ./server

    # Node.js runtime environment
    runtime: node

    # Build phase: Install backend dependencies, build client, compile TypeScript
    # Step 1: npm ci in server directory (installs server dependencies)
    # Step 2: npm run build compiles server TypeScript to dist/
    # Step 3: Implicit build of client happens in npm run build (if configured in server package.json)
    #
    # IMPORTANT: Your server's package.json build script must:
    # - Compile TypeScript: tsc (outputs to dist/)
    # - Build client: cd ../client && npm ci && npm run build
    # OR use a monorepo tool like npm workspaces with a root-level build script
    #
    # Alternative if using root-level monorepo build:
    # buildCommand: npm ci && npm run build:all
    buildCommand: npm ci && npm run build

    # Start phase: Run the compiled Express server
    # Ensure this path matches your TypeScript output directory
    startCommand: node dist/index.js

    # Plan: free tier is sufficient for development/testing
    # Upgrade to "starter" or higher for production traffic
    plan: free

    # Environment variables
    # These control API behavior, database connection, CORS, and frontend API endpoint
    envVars:

      # Node environment mode (production for Render deployments)
      - key: NODE_ENV
        value: production

      # Express listening port
      # Render dynamically assigns a port; this is the internal port
      # Express must call app.listen(process.env.PORT)
      - key: PORT
        value: "4000"

      # MongoDB Atlas connection string
      # Format: mongodb+srv://username:password@cluster.mongodb.net/dbname?retryWrites=true&w=majority
      # Sync: false means this value is NOT synced back from Render Dashboard
      # Manage this value via environment configuration only (security best practice)
      - key: MONGODB_URI
        value: mongodb+srv://user:password@cluster.mongodb.net/dbname
        sync: false

      # JWT secret for token signing and verification
      # generateValue: true creates a random 32-character secret automatically
      # Each deployment gets a unique secret (existing tokens become invalid)
      # For persistent authentication across redeployments, manage this externally
      - key: JWT_SECRET
        generateValue: true

      # CORS allowed origins: comma-separated list
      # In single-service pattern, this is typically the service's own URL
      # Example: https://app.onrender.com (no separate domain for frontend)
      # If using custom domain, add it here
      - key: ALLOWED_ORIGINS
        value: http://localhost:3000,https://app.onrender.com
        sync: false

      # Optional: OpenRouter API key for LLM features (if using)
      - key: OPENROUTER_API_KEY
        value: ""
        sync: false

      # Optional: Logging level
      # Possible values: info, warn, error, debug
      - key: LOG_LEVEL
        value: info

      # Optional: Apollo Server introspection (disable in production)
      - key: APOLLO_INTROSPECTION_ENABLED
        value: "false"

    # Auto-deploy settings: redeploy whenever code is pushed to the specified branch
    # Set to false if you prefer manual deployments only
    autoDeploy: true

# =========================================================================
# MONGODB ATLAS SETUP (External Database)
# =========================================================================
# MongoDB Atlas is hosted externally and accessed via connection string.
#
# Steps to set up MongoDB Atlas:
# 1. Create an account at https://www.mongodb.com/cloud/atlas
# 2. Create a project and cluster
# 3. Create a database user (e.g., username: "appuser", auto-generate password)
# 4. Whitelist Render IP addresses:
#    - Go to Network Access → Add IP Whitelist Entry
#    - Add IP: 0.0.0.0/0 (allows all IPs; for production, consider restricting)
# 5. Get the connection string from Cluster → Connect → Drivers
#    Format: mongodb+srv://user:password@cluster.mongodb.net/dbname?retryWrites=true&w=majority
# 6. Add this string to MONGODB_URI environment variable
#
# Note: Render also offers managed databases, but MongoDB Atlas is free for development

